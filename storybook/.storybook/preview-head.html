<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script>
  const cssHref = `${window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
    ? window.location.origin.replace(":6006", ":3000")
    : 'https://caselaw.nationalarchives.gov.uk'}/static/css/main.css`;

  const link = document.createElement("link");
  link.rel = "stylesheet";
  link.href = cssHref;
  document.head.appendChild(link);
</script>
