cument_to_return+%3A%3D+if+%28%24version_uri%29+then+%24version+else+%24judgment%0A%0A%0Alet+%24raw_xml+%3A%3D+if+%28%24show_unpublished%29+then%0A++++++++%24document_to_return%0A++++else+if+%28xs%3Aboolean%28%24is_published%29%29+then%0A++++++++%24document_to_return%0A++++else%0A++++++++%28%29%0A%0A%28%3A+If+a+search+query+string+is+present%2C+highlight+instances+%3A%29%0Alet+%24transformed+%3A%3D+if%28%24search_query%29+then%0A++++++xdmp%3Axslt-eval%28%0A++++++++%24delete_meta_marks_xslt%2C%0A++++++++cts%3Ahighlight%28%0A++++++++++%24raw_xml%2C%0A++++++++++helper%3Amake-q-query%28%24search_query%29%2C%0A++++++++++%3Cuk%3Amark%3E%7B%24cts%3Atext%7D%3C%2Fuk%3Amark%3E%0A++++++++%29%0A++++++%29%0A++++else%0A++++++%24raw_xml%0A%0Areturn+%24transformed%0A&vars=%7B%22uri%22%3A+%22%2Fewhc%2Fch%2F2023%2F1032.xml%22%2C+%22version_uri%22%3A+null%2C+%22show_unpublished%22%3A+true%2C+%22search_query%22%3A+null%7D
