        class=\"CoverText\" style=\"text-align:left\">Neutral Citation Number: <neutralCitation>[2023]
        EWHC 1032 (Ch)</neutralCitation></p>\n      <p class=\"CoverText\">Case No:
        <docketNumber>CR-2020-002705</docketNumber></p>\n      <p class=\"CoverMain\">IN
        THE HIGH COURT OF JUSTICE</p>\n      <p><span style=\"font-weight:bold;text-decoration-line:underline;text-decoration-style:solid\">BUSINESS
        AND PROPERTY COURTS OF ENGLAND AND WALES</span></p>\n      <p><span style=\"font-weight:bold;text-decoration-line:underline;text-decoration-style:solid\">CHANCERY
        DIVISION</span></p>\n      <p class=\"CoverText\">Royal Courts of Justice</p>\n      <p
        class=\"CoverText\">Rolls Building, Fetter Lane, London, EC4A 1NL</p>\n      <p
        class=\"CoverText\">Date: <docDate date=\"2023-05-02\" refersTo=\"#judgment\">2
        May 2023</docDate></p>\n      <p style=\"text-align:center\"><span style=\"font-weight:bold\">Before</span>
        :</p>\n      <p class=\"CoverMain\" style=\"text-align:center\">Jon Turner
        KC sitting as a Deputy High Court Judge</p>\n      <p style=\"text-align:center\">-
        - - - - - - - - - - - - - - - - - - - -</p>\n      <p style=\"text-align:center\"><span
        style=\"font-weight:bold\">Between :</span></p>\n      <table uk:widths=\"1.23in
        3.87in 1.24in\">\n\t<tr>\n\t  <td>\n\t    <p/>\n\t  </td>\n\t  <td>\n\t    <p
        style=\"text-align:center\"><party as=\"#claimant\" refersTo=\"#secretary-of-state-for-business-energy-and-industrial-strategy\"
