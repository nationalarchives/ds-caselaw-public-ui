{% load static i18n waffle_tags navigation_tags %}
<div class="beta-header">

    <div class="govuk-header__container govuk-width-container">
      <div class="beta-header__service">
        <h1 class="beta-header__service-title">Find case law<span class="beta-header__beta-label">BETA</span></h1>
        <p class="beta-header__helper-text">Judgments and decisions from 2001 onwards</p>
      </div>
      <div class="govuk-header__content">
        <nav aria-label="Menu" class="govuk-header__navigation">
          <button type="button" class="govuk-header__menu-button govuk-js-header-toggle" aria-controls="navigation" hidden>

          </button>
          <ul id="navigation" class="govuk-header__navigation-list">
            <li class="{% navigation_item_class 'home' %}">
              <a class="govuk-header__link" title="Home" href="{% url 'home' %}">
                Home
              </a>
            </li>
            <li class="{% navigation_item_class 'about_this_service' %}">
              <a class="govuk-header__link" title="About" href="{% url 'about_this_service' %}">

              </a>
            </li>
            <li class="{% navigation_item_class 'how_to_use_this_service' %}">
              <a class="govuk-header__link" title="Help and guidance" href="{% url 'how_to_use_this_service' %}">

              </a>
