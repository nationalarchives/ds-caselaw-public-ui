name: CI
permissions: {}

on:
  pull_request:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]

  push:
    branches: ["master", "main"]
    paths-ignore: ["docs/**"]

  merge_group:

jobs:
  linter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            requirements/base.txt
            requirements/local.txt
      - name: Run pre-commit
        uses: pre-commit/action@2c7b3805fd2a0fd8c1884dcaebf91fc102a13ecd # v3.0.1
        env:
          SKIP: no-commit-to-branch,stylelint

  build-scss:
    needs: linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install node dependencies
        run: npm ci

      - name: Build scss
        run: npm run build

  js-tests:
    needs: linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0

      - name: Install node dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  production-smoke-test:
    needs: linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Create external network
        run: docker network create caselaw

      - name: Build and run production smoke test
        run: docker compose -f docker-compose.yml -f docker-compose.prod-test.yml up -d --build --wait --wait-timeout 600

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.prod-test.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.prod-test.yml down

  build-django:
    needs: linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Copy .env.example file
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a
        with:
          source: ".env.example"
          target: ".env"

      - name: Build the Stack
        uses: docker/bake-action@6614cfa25eff9a0b2b2697efb0b6159e7680d584 # v7.2.0
        with:
          targets: django
          load: true
          set: |
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
            *.tags=ds_judgments_public_ui_django:latest
            *.output=type=docker,dest=/tmp/django-image.tar

      - name: Upload Django image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: django-image
          path: /tmp/django-image.tar

  download-postgres:
    needs: linter
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker
        uses: docker/setup-docker-action@0234bb73ccb40f0c430b795634f9247e2b5c2d23 # v5.2.0
        with:
          version: v29.5.2

      - name: Copy .env.example file
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a
        with:
          source: ".env.example"
          target: ".env"

      - name: Download Postgres image
        run: docker compose pull postgres

      - name: Save Postgres image
        run: |
          POSTGRES_IMAGE="$(docker compose config --images postgres)"
          docker save -o /tmp/postgres-image.tar "${POSTGRES_IMAGE}"

      - name: Upload Postgres image
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: postgres-image
          path: /tmp/postgres-image.tar

  static-analysis:
    needs:
      - build-django
      - download-postgres
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Copy .env.example file
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a
        with:
          source: ".env.example"
          target: ".env"

      - name: Download Django image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: django-image
          path: /tmp

      - name: Download Postgres image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: postgres-image
          path: /tmp

      - name: Load Django image
        run: docker load --input /tmp/django-image.tar

      - name: Load Postgres image
        run: docker load --input /tmp/postgres-image.tar

      - name: Create docker network as used in dev
        run: docker network create caselaw

      - name: Run mypy
        run: docker compose run django mypy ds_judgements_public_ui judgments

  pytest:
    needs:
      - build-django
      - download-postgres
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Copy .env.example file
        uses: canastro/copy-file-action@ae66602ce7d214dbd2e298c1db67a81388755a0a
        with:
          source: ".env.example"
          target: ".env"

      - name: Create docker network as used in dev
        run: docker network create caselaw

      - name: Download Django image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: django-image
          path: /tmp

      - name: Download Postgres image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: postgres-image
          path: /tmp

      - name: Load Django image
        run: docker load --input /tmp/django-image.tar

      - name: Load Postgres image
        run: docker load --input /tmp/postgres-image.tar

      - name: Run DB Migrations
        run: docker compose run --rm django python manage.py migrate --settings=config.settings.test

      - name: Run Django Tests with coverage
        run: docker compose run django pytest --cov --cov-branch --cov-report=xml -vvvv -rsa -m "not local"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]

      - name: Tear down the Stack
        run: docker compose down

  e2e-tests:
    needs:
      - build-scss
      - js-tests
      - build-django
      - download-postgres
      - pytest
      - static-analysis
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Copy .env.example file
        run: cp .env.example .env

      - name: Create docker network as used in dev
        run: docker network create caselaw

      - name: Download Django image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: django-image
          path: /tmp

      - name: Download Postgres image
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: postgres-image
          path: /tmp

      - name: Load Django image
        run: docker load --input /tmp/django-image.tar

      - name: Load Postgres image
        run: docker load --input /tmp/postgres-image.tar

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0

      - name: Install requests
        run: "pip install requests"

      - name: Run DB Migrations
        run: docker compose run --rm django python manage.py migrate --settings=config.settings.test

      - name: Setup django server for e2e tests
        run: docker compose up -d django

      - name: Install NPM deps
        run: npm install

      - name: Build the JS and SASS
        run: npm run build

      - name: Kick off the django server itself
        run: docker compose exec -d django python manage.py runserver 0.0.0.0:3000

      - name: Build playwright runner container
        run: docker compose up -d e2e_tests

      - name: Run playwright e2e tests
        run: docker compose exec e2e_tests pytest --base-url http://django:3000 --tracing retain-on-failure

      - name: Copy trace files from container
        if: ${{ always() }}
        run: docker compose cp e2e_tests:/app/test-results artifacts
        continue-on-error: true

      - name: Upload trace files as github artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: playwright-report
          path: artifacts
          retention-days: 7

      - name: Upload snapshots as GitHub artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: playwright-snapshots
          path: e2e_tests/snapshots
          retention-days: 7

      - name: Tear down the Stack
        run: docker compose down
